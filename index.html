<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier — Studio di architettura</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>

    <header>
      <!-- Navbar Bootstrap (navbar-expand-md, sticky in cima) -->
       <nav class="navbar navbar-expand-md navbar-dark main-nav">
        <div class="container">
          <a class="navbar-brand fw-bold" href="#studio">Atelier</a>
          <button class="navbar-toggler" type="button"
                  data-bs-toggle="collapse" data-bs-target="#nav-menu"
                  aria-controls="nav-menu" aria-expanded="false"
                  aria-label="Apri menu">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="nav-menu">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item"><a class="nav-link" href="#studio">Studio</a></li>
              <li class="nav-item"><a class="nav-link" href="#servizi">Servizi</a></li>
              <li class="nav-item"><a class="nav-link" href="#contatti">Contatti</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <section id="studio" class="hero-section d-flex align-items-center justify-content-center text-center text-white">
      <!-- Hero: titolo grande, sottotitolo, CTA. Sfondo brand. min-height 80vh -->
       <div class="container">
        <h1 class="fs-1 fw-bold mb-3">Architettura per spaces che parlano</h1>
        <p class="fs-5 mb-4">
          Progettiamo case, uffici e spazi commerciali con attenzione alla luce, ai materiali e al contesto.
        </p>
        <a href="#contatti" class="btn btn-primary btn-lg">Inizia un progetto</a>
      </div>
    </section>

    <section id="servizi">
      <!-- 3 card servizi affiancate da md in su -->
    </section>

    <section id="contatti">
      <!-- Form contatti Bootstrap, larghezza limitata e centrata -->
    </section>

    <footer>
      <!-- 3 colonne: Atelier+indirizzo / Link / Contatti. Copyright in fondo -->
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
